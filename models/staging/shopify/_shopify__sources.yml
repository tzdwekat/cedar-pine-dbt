version: 2

sources:
  - name: shopify
    description: "Raw Shopify data landed by Fivetran"
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    tables:
      - name: orders
        identifier: ORDERS
        config:
          loaded_at_field: "CAST(o_orderdate AS TIMESTAMP)"
          freshness:
            warn_after: { count: 48, period: hour }
            error_after: { count: 72, period: hour }
      - name: customers
        identifier: CUSTOMER
      - name: line_items
        identifier: LINEITEM